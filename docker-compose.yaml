version: "3.8"

services:
  ollama:
    image: ollama/ollama:latest
    container_name: qwen-chat-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
      - OLLAMA_ORIGINS=*
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  fastapi:
    build:
      context: ./fastapi
      dockerfile: Dockerfile
    container_name: qwen-chat-fastapi
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=development
      - DB_TYPE=sqlite
      - SQLITE_DB_PATH=/data/qwen_chat.db
      - OLLAMA_HOST=http://ollama:11434
      - OLLAMA_TIMEOUT=120
      - REDIS_URL=redis://redis:6379
    volumes:
      - ./fastapi:/app
      - fastapi_data:/data
      - /app/.venv
    depends_on:
      ollama:
        condition: service_healthy
      redis:
        condition: service_started
    command: poetry run uvicorn app.asgi:app --host 0.0.0.0 --port 8000 --reload

  vue:
    build:
      context: ./vue
      dockerfile: Dockerfile
    container_name: qwen-chat-vue
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE_URL=http://localhost:8000
    volumes:
      - ./vue:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0 --port 5173

  redis:
    image: redis:7-alpine
    container_name: qwen-chat-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  postgres:
    image: postgres:16-alpine
    container_name: qwen-chat-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=qwen_chat
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    profiles:
      - postgres

volumes:
  ollama_data:
  fastapi_data:
  redis_data:
  postgres_data: